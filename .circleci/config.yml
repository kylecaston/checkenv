version: 2.1

executors:
  python:
    parameters:
      version:
        type: string
    docker:
      - image: cimg/python:<< parameters.version >>

commands:
  checkout-public-repo:
    steps:
      - run:
          name: Checkout code
          command: |
            set -eu
            git init .
            git remote add origin https://github.com/kylecaston/checkenv.git
            if [ -n "${CIRCLE_TAG:-}" ]; then
              git fetch --depth=1 origin "refs/tags/${CIRCLE_TAG}"
            else
              git fetch --depth=1 origin "refs/heads/${CIRCLE_BRANCH}"
            fi
            git checkout --detach FETCH_HEAD

jobs:
  build-and-test:
    parameters:
      version:
        type: string
    executor:
      name: python
      version: << parameters.version >>
    steps:
      - checkout-public-repo
      - run:
          name: Install dependencies
          command: |
            python -m pip install --upgrade pip setuptools wheel
            python -m pip install -r requirements.txt
      - run:
          name: Run Ruff lint
          command: python -m ruff check .
      - run:
          name: Check formatting
          command: python -m ruff format --check .
      - run:
          name: Run tests and coverage
          command: python -m pytest --cov=checkenv --cov-report=term-missing -vv
      - run:
          name: Build distributions
          command: python -m build
      - run:
          name: Validate distributions
          command: python -m twine check dist/*
      - run:
          name: Update coverage
          command: |
            if [ "<< parameters.version >>" = "3.13" ]; then
              coveralls
            else
              echo "Skipping Coveralls upload for Python << parameters.version >>"
            fi
      - store_artifacts:
          path: dist

  publish-to-pypi:
    parameters:
      version:
        type: string
    executor:
      name: python
      version: << parameters.version >>
    environment:
      TWINE_USERNAME: __token__
      TWINE_NON_INTERACTIVE: "1"
    steps:
      - checkout-public-repo
      - run:
          name: Install packaging tools
          command: python -m pip install --upgrade pip build twine
      - run:
          name: Build distributions
          command: python -m build
      - run:
          name: Validate distributions
          command: python -m twine check dist/*
      - run:
          name: Publish distributions to PyPI
          command: python -m twine upload dist/*
      - store_artifacts:
          path: dist

workflows:
  main:
    jobs:
      - build-and-test:
          context: checkenv
          matrix:
            parameters:
              version: ["3.11", "3.12", "3.13", "3.14"]
          filters:
            tags:
              only: /.*/
      - publish-to-pypi:
          context: checkenv
          version: "3.13"
          requires:
            - build-and-test-3.11
            - build-and-test-3.12
            - build-and-test-3.13
            - build-and-test-3.14
          filters:
            tags:
              only: /^v[0-9]+(\.[0-9]+){2}.*$/
            branches:
              ignore: /.*/
