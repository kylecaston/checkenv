version: 2.1

executors:
  python-313:
    docker:
      - image: cimg/python:3.13

jobs:
  build-and-test:
    executor: python-313
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            python -m pip install --upgrade pip setuptools wheel
            python -m pip install -r requirements.txt pytest-cov
      - run:
          name: Run tests and coverage
          command: python -m pytest --cov=checkenv --cov-report=term-missing -vv
      - run:
          name: Update coverage
          command: coveralls

  publish-to-pypi:
    executor: python-313
    environment:
      TWINE_USERNAME: __token__
      TWINE_NON_INTERACTIVE: "1"
    steps:
      - checkout
      - run:
          name: Install packaging tools
          command: python -m pip install --upgrade pip build twine
      - run:
          name: Build distributions
          command: python -m build
      - run:
          name: Validate distributions
          command: python -m twine check dist/*
      - run:
          name: Publish distributions to PyPI
          command: python -m twine upload dist/*
      - store_artifacts:
          path: dist

workflows:
  main:
    jobs:
      - build-and-test:
          context: checkenv
          filters:
            tags:
              only: /.*/
      - publish-to-pypi:
          context: checkenv
          requires:
            - build-and-test
          filters:
            tags:
              only: /^v[0-9]+(\.[0-9]+){2}.*$/
            branches:
              ignore: /.*/
